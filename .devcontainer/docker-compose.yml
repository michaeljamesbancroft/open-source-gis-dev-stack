services:

  postgis:
    image: postgis/postgis:16-3.4
    container_name: postgis
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      POSTGRES_USER: ${POSTGRES_USER:?missing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: ${POSTGRES_DB:?missing}

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?missing}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?missing}

    ports:
      - "127.0.0.1:5050:80"

    depends_on:
      - postgis

    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/.pgpass:/pgpass

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped

    ports:
      - "127.0.0.1:8081:8080"

    depends_on:
      - postgis

  jupyter:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    container_name: jupyterlab
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-}

    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:8501:8501"
      - "127.0.0.1:4200:4200"

    volumes:
      - ../notebooks:/home/jovyan/work
      - ../data:/home/jovyan/data
      - ../src:/home/jovyan/src
      - ../outputs:/home/jovyan/outputs

    depends_on:
      - postgis

    command: start-notebook.py --IdentityProvider.token=${JUPYTER_TOKEN:-}

  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: pg_tileserv
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      DATABASE_URL: postgres://${TILESERVER_USER:?missing}:${TILESERVER_PASSWORD:?missing}@postgis:5432/${POSTGRES_DB:?missing}

    ports:
      - "127.0.0.1:7800:7800"

    depends_on:
      postgis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?missing}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?missing}

    command: server /data --console-address ":9001"

    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

    volumes:
      - minio_data:/data

  geoserver:
    image: docker.osgeo.org/geoserver:2.26.x
    container_name: geoserver
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:?missing}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:?missing}
      INSTALL_EXTENSIONS: "true"
      STABLE_EXTENSIONS: "vectortiles,ysld,ogcapi-features"

    ports:
      - "127.0.0.1:8082:8080"

    volumes:
      - geoserver_data:/opt/geoserver_data

    depends_on:
      postgis:
        condition: service_healthy

volumes:
  postgis_data:
  pgadmin_data:
  minio_data:
  geoserver_data: